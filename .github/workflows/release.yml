name: Release Windows EXE

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $expectedTag = "v$packageVersion"
          $actualTag = "${{ github.ref_name }}"

          if ($actualTag -ne $expectedTag) {
            Write-Error "Git tag '$actualTag' does not match package.json version '$packageVersion'. Expected tag: '$expectedTag'."
            exit 1
          }

      - name: Build Windows release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickiptvplayer-windows-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
